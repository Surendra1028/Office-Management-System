<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard – WorkSphere</title>
    <style>
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        background: url("WhatsApp Image 2025-09-03 at 22.05.40_f4b1fb67.jpg")
          no-repeat center center/cover;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        color: white;
        position: relative;
      }

      body::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.65);
        z-index: -1;
      }

      h2 {
        font-size: 34px;
        margin-bottom: 20px;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
      }

      .dashboard {
        width: 100%;
        max-width: 1000px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 25px;
      }

      section {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(14px);
        border-radius: 18px;
        padding: 25px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        animation: fadeIn 1s ease;
      }

      h3 {
        margin-bottom: 15px;
        font-size: 22px;
        border-left: 5px solid #00c6ff;
        padding-left: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        color: white;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        text-align: center;
      }

      button {
        padding: 8px 14px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: white;
        font-weight: 600;
        background: linear-gradient(135deg, #667eea, #764ba2, #6a11cb);
        transition: all 0.3s ease;
      }

      button:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 18px rgba(118, 75, 162, 0.5);
      }

      input {
        padding: 10px;
        border-radius: 10px;
        border: none;
        margin: 5px;
        outline: none;
        background: rgba(255, 255, 255, 0.18);
        color: white;
      }

      #welcome {
        margin-bottom: 20px;
        font-size: 18px;
        opacity: 0.9;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <nav
      class="top-nav"
      style="
        position: fixed;
        top: 12px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 200;
      "
    >
      <div class="logo">WorkSphere – Shouryanga Solutions</div>
      <div style="position: relative">
        <button
          id="hamburger"
          aria-label="Menu"
          style="
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
          "
        >
          ☰
        </button>
        <div
          id="menuDropdown"
          style="
            display: none;
            position: absolute;
            top: 48px;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            min-width: 140px;
          "
        >
          <div style="margin-bottom: 6px">
            <button
              id="adminOption"
              style="
                background: transparent;
                border: none;
                color: white;
                cursor: pointer;
                padding: 8px 12px;
                width: 100%;
                text-align: left;
              "
            >
              Admin (Login)
            </button>
          </div>
          <div>
            <button
              id="employeeOption"
              style="
                background: transparent;
                border: none;
                color: white;
                cursor: pointer;
                padding: 8px 12px;
                width: 100%;
                text-align: left;
              "
            >
              Employee
            </button>
            <div
              id="employeeDropdown"
              style="
                display: none;
                margin-top: 6px;
                padding-top: 6px;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
              "
            >
              <a
                href="signup.html"
                style="
                  display: block;
                  color: white;
                  padding: 6px 12px;
                  text-decoration: none;
                "
                >Signup</a
              >
              <a
                href="login.html"
                style="
                  display: block;
                  color: white;
                  padding: 6px 12px;
                  text-decoration: none;
                "
                >Login</a
              >
            </div>
          </div>
        </div>
      </div>
    </nav>
    <script>
      (function () {
        const hamburger = document.getElementById("hamburger");
        const menu = document.getElementById("menuDropdown");
        const adminBtn = document.getElementById("adminOption");
        const empBtn = document.getElementById("employeeOption");
        const empDrop = document.getElementById("employeeDropdown");
        hamburger &&
          hamburger.addEventListener("click", (e) => {
            e.stopPropagation();
            menu.style.display =
              menu.style.display === "block" ? "none" : "block";
          });
        adminBtn &&
          adminBtn.addEventListener("click", () => {
            window.location.href = "login.html?admin=1";
          });
        empBtn &&
          empBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            empDrop.style.display =
              empDrop.style.display === "block" ? "none" : "block";
          });
        document.addEventListener("click", () => {
          if (menu) menu.style.display = "none";
          if (empDrop) empDrop.style.display = "none";
        });
      })();
    </script>
    <h2>Admin Dashboard</h2>
    <p id="welcome"></p>

    <div style="width: 100%; max-width: 1000px; margin: 6px 0 18px">
      <button
        id="toggleAccountBtn"
        style="
          padding: 8px 12px;
          border-radius: 10px;
          border: none;
          background: linear-gradient(90deg, #ff7a7a, #ff4d4d);
          color: white;
          cursor: pointer;
          font-weight: 600;
        "
      >
        Change Admin Email/Password
      </button>
      <div
        id="accountForm"
        style="
          display: none;
          margin-top: 12px;
          background: rgba(255, 255, 255, 0.03);
          padding: 12px;
          border-radius: 8px;
        "
      >
        <input
          id="newEmail"
          type="email"
          placeholder="New email (leave blank to keep)"
          style="
            padding: 8px;
            border-radius: 8px;
            border: none;
            margin: 6px 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            color: white;
          "
        />
        <input
          id="newPassword"
          type="password"
          placeholder="New password (min 8 chars)"
          style="
            padding: 8px;
            border-radius: 8px;
            border: none;
            margin: 6px 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            color: white;
          "
        />
        <input
          id="confirmPassword"
          type="password"
          placeholder="Confirm new password"
          style="
            padding: 8px;
            border-radius: 8px;
            border: none;
            margin: 6px 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            color: white;
          "
        />
        <div style="margin-top: 8px; display: flex; gap: 8px">
          <button
            id="saveAccountBtn"
            style="
              padding: 8px 12px;
              border-radius: 8px;
              border: none;
              background: #21ba45;
              color: white;
              cursor: pointer;
            "
          >
            Save
          </button>
          <button
            id="cancelAccountBtn"
            style="
              padding: 8px 12px;
              border-radius: 8px;
              border: none;
              background: gray;
              color: white;
              cursor: pointer;
            "
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <div class="dashboard">
      <section>
        <h3>Employee Data</h3>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Salary</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="employeeList"></tbody>
        </table>
      </section>

      <section>
        <h3>Leave Requests</h3>
        <table>
          <thead>
            <tr>
              <th>Employee</th>
              <th>Date</th>
              <th>Reason</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="leaveRequests"></tbody>
        </table>
      </section>

      <section>
        <h3>Set Salary</h3>
        <form id="salaryForm">
          <input
            type="email"
            id="empEmail"
            placeholder="Employee Email"
            required
          />
          <input
            type="number"
            id="empSalary"
            placeholder="Salary Amount"
            required
          />
          <button type="submit">Save</button>
        </form>
      </section>

      <section>
        <h3>Assign Daily Schedule</h3>
        <form id="scheduleForm">
          <input
            type="email"
            id="scheduleEmail"
            placeholder="Employee Email"
            required
          />
          <input type="date" id="scheduleDate" required />
          <input
            type="text"
            id="scheduleTask"
            placeholder="Task / Work Details"
            required
          />
          <button type="submit">Assign</button>
        </form>

        <h4>All Assigned Schedules</h4>
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Date</th>
              <th>Task</th>
            </tr>
          </thead>
          <tbody id="scheduleList"></tbody>
        </table>
      </section>
    </div>

    <script>
      const API_URL = "http://localhost:3000/api";

      // Verify admin access
      async function verifyAdminAccess() {
        const token = localStorage.getItem("authToken");

        if (!token) {
          window.location.href = "login.html";
          return false;
        }

        try {
          const response = await fetch(`${API_URL}/auth/me`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (!response.ok) {
            localStorage.removeItem("authToken");
            window.location.href = "login.html";
            return false;
          }

          const data = await response.json();
          const user = data.user;

          // Verify admin role
          if (user.role !== "admin") {
            alert("Access denied! Admin access required.");
            window.location.href = "login.html";
            return false;
          }

          document.getElementById("welcome").innerText =
            `Welcome, ${user.name}`;
          return true;
        } catch (error) {
          console.error("Auth error:", error);
          window.location.href = "login.html";
          return false;
        }
      }

      // Initialize page
      verifyAdminAccess().then((isAdmin) => {
        if (isAdmin) {
          loadEmployees();
          loadLeaveRequests();
          loadSchedules();
        }
      });

      const token = localStorage.getItem("authToken");

      // Load all employees
      async function loadEmployees() {
        try {
          const response = await fetch(`${API_URL}/users/employees`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (!response.ok) throw new Error("Failed to load employees");

          const data = await response.json();
          renderEmployees(data.employees);
        } catch (error) {
          console.error("Error loading employees:", error);
          alert("Failed to load employees");
        }
      }

      function renderEmployees(employees) {
        const tbody = document.getElementById("employeeList");
        tbody.innerHTML = "";

        employees.forEach((emp) => {
          const row = document.createElement("tr");
          row.innerHTML = `
          <td>${emp.name}</td>
          <td>${emp.email}</td>
          <td>${emp.role}</td>
          <td id="salary-${emp._id}">Loading...</td>
          <td><button onclick="deleteEmployee('${emp._id}', '${emp.name}')">Delete</button></td>
        `;
          tbody.appendChild(row);

          // Load salary for this employee
          loadSalaryForEmployee(emp._id, emp.email);
        });
      }

      async function loadSalaryForEmployee(empId, email) {
        try {
          const response = await fetch(`${API_URL}/salaries`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (response.ok) {
            const data = await response.json();
            const salary = data.salaries.find((s) => s.email === email);
            const salaryCell = document.getElementById(`salary-${empId}`);
            salaryCell.innerText = salary ? salary.amount : "Not Set";
          }
        } catch (error) {
          console.error("Error loading salary:", error);
        }
      }

      async function deleteEmployee(empId, empName) {
        if (!confirm(`Are you sure you want to delete ${empName}?`)) return;

        try {
          const response = await fetch(`${API_URL}/users/${empId}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });

          if (!response.ok) throw new Error("Failed to delete employee");

          alert("Employee deleted successfully!");
          loadEmployees();
        } catch (error) {
          console.error("Error deleting employee:", error);
          alert("Failed to delete employee");
        }
      }

      // Load leave requests
      async function loadLeaveRequests() {
        try {
          const response = await fetch(`${API_URL}/leaves`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (!response.ok) throw new Error("Failed to load leaves");

          const data = await response.json();
          renderLeaveRequests(data.leaves);
        } catch (error) {
          console.error("Error loading leaves:", error);
          alert("Failed to load leave requests");
        }
      }

      function renderLeaveRequests(leaves) {
        const tbody = document.getElementById("leaveRequests");
        tbody.innerHTML = "";

        leaves.forEach((leave) => {
          const row = document.createElement("tr");
          const date = new Date(leave.date).toLocaleDateString();
          row.innerHTML = `
          <td>${leave.email}</td>
          <td>${date}</td>
          <td>${leave.reason}</td>
          <td>${leave.status}</td>
          <td>
            <button onclick="updateLeaveStatus('${leave._id}', 'Approved')">Approve</button>
            <button onclick="updateLeaveStatus('${leave._id}', 'Rejected')">Reject</button>
          </td>
        `;
          tbody.appendChild(row);
        });
      }

      async function updateLeaveStatus(leaveId, status) {
        try {
          const response = await fetch(`${API_URL}/leaves/${leaveId}`, {
            method: "PATCH",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ status }),
          });

          if (!response.ok) throw new Error("Failed to update leave status");

          alert(`Leave ${status.toLowerCase()}!`);
          loadLeaveRequests();
        } catch (error) {
          console.error("Error updating leave:", error);
          alert("Failed to update leave status");
        }
      }

      // Set salary
      document
        .getElementById("salaryForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("empEmail").value;
          const amount = document.getElementById("empSalary").value;

          try {
            const response = await fetch(`${API_URL}/salaries/set`, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ email, amount: Number(amount) }),
            });

            if (!response.ok) throw new Error("Failed to set salary");

            alert(`Salary updated for ${email}`);
            document.getElementById("salaryForm").reset();
            loadEmployees();
          } catch (error) {
            console.error("Error setting salary:", error);
            alert("Failed to set salary");
          }
        });

      // Load schedules
      async function loadSchedules() {
        try {
          const response = await fetch(`${API_URL}/schedules`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (!response.ok) throw new Error("Failed to load schedules");

          const data = await response.json();
          renderSchedules(data.schedules);
        } catch (error) {
          console.error("Error loading schedules:", error);
          alert("Failed to load schedules");
        }
      }

      function renderSchedules(schedules) {
        const tbody = document.getElementById("scheduleList");
        tbody.innerHTML = "";

        schedules.forEach((schedule) => {
          const row = document.createElement("tr");
          const date = new Date(schedule.date).toLocaleDateString();
          row.innerHTML = `<td>${schedule.email}</td><td>${date}</td><td>${schedule.task}</td>`;
          tbody.appendChild(row);
        });
      }

      // Assign schedule
      document
        .getElementById("scheduleForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("scheduleEmail").value;
          const date = document.getElementById("scheduleDate").value;
          const task = document.getElementById("scheduleTask").value;

          try {
            const response = await fetch(`${API_URL}/schedules/create`, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ email, date, task }),
            });

            if (!response.ok) throw new Error("Failed to create schedule");

            alert("Schedule assigned!");
            document.getElementById("scheduleForm").reset();
            loadSchedules();
          } catch (error) {
            console.error("Error creating schedule:", error);
            alert("Failed to assign schedule");
          }
        });

      // Logout function
      function logout() {
        localStorage.removeItem("authToken");
        window.location.href = "login.html";
      }

      // Account update handlers
      document
        .getElementById("toggleAccountBtn")
        .addEventListener("click", () => {
          const f = document.getElementById("accountForm");
          f.style.display = f.style.display === "block" ? "none" : "block";
        });

      document
        .getElementById("cancelAccountBtn")
        .addEventListener("click", () => {
          document.getElementById("accountForm").style.display = "none";
        });

      document
        .getElementById("saveAccountBtn")
        .addEventListener("click", async () => {
          const email = document.getElementById("newEmail").value.trim();
          const password = document.getElementById("newPassword").value;
          const confirm = document.getElementById("confirmPassword").value;

          if (password && password.length < 8) {
            alert("Password must be at least 8 characters");
            return;
          }
          if (password && password !== confirm) {
            alert("Passwords do not match");
            return;
          }

          try {
            const body = {};
            if (email) body.email = email;
            if (password) body.password = password;

            if (Object.keys(body).length === 0) {
              alert("No changes provided");
              return;
            }

            const res = await fetch(`${API_URL}/auth/update`, {
              method: "PATCH",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify(body),
            });

            if (!res.ok) {
              const err = await res.json();
              throw new Error(err.message || "Update failed");
            }
            const data = await res.json();
            alert("Account updated. You will be redirected to login.");
            // clear stored auth and redirect to login (use new token after re-login)
            localStorage.removeItem("authToken");
            localStorage.removeItem("currentUser");
            window.location.href = "login.html";
          } catch (e) {
            console.error("Update failed", e);
            alert("Update failed: " + e.message);
          }
        });
    </script>
  </body>
</html>
